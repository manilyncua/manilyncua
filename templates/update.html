<!DOCTYPE html>
<html>
<head>
    <title>Update Document - LGU System</title>

    <style>

        /* ===== GLOBAL ===== */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        /* ===== HEADER ===== */
        .header{
            background:#1e3c72;
            color:white;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        /* ===== LAYOUT ===== */
        .container{
            display:flex;
        }

        /* ===== SIDEBAR ===== */
        .sidebar{
            width:250px;
            background:#2c3e50;
            min-height:100vh;
            padding-top:20px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px 20px;
        }

        .sidebar a:hover{
            background:#34495e;
        }

        /* ===== CONTENT ===== */
        .content{
            flex:1;
            padding:40px;
        }

        /* ===== FORM CARD ===== */
        .form-box{
            background:white;
            width:500px;
            padding:30px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        /* TITLE */
        .form-box h2{
            margin-bottom:20px;
            color:#1e3c72;
        }

        /* LABEL */
        label{
            font-weight:bold;
            color:#333;
            display:block;
            margin-top:15px;
            margin-bottom:8px;
        }

        /* INPUTS & SELECTS */
        input, select, textarea{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-family:Arial, sans-serif;
            font-size:14px;
        }

        textarea{
            resize:none;
            height:100px;
        }

        select{
            cursor:pointer;
        }

        /* BUTTON */
        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#1e3c72;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#16325c;
        }

        /* BACK LINK */
        .back{
            display:inline-block;
            margin-top:10px;
            color:#1e3c72;
            text-decoration:none;
        }

        .back:hover{
            text-decoration:underline;
        }

        .info-box{
            background:#f0f4f8;
            padding:15px;
            border-radius:5px;
            margin-bottom:20px;
            border-left:4px solid #1e3c72;
        }

        .info-box p{
            margin:8px 0;
            color:#333;
        }

        .info-box strong{
            color:#1e3c72;
        }

    </style>

</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <h2>Sangguniang Bayan System</h2>
        <div>Update Document Status</div>
    </div>

    <!-- MAIN -->
    <div class="container">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <a href="/">Dashboard</a>
            <a href="/documents">Document Management</a>
            <a href="/archives">Archives</a>
            <a href="/reports">Reports</a>
            <a href="/users">Users</a>
        </div>

        <!-- CONTENT -->
        <div class="content">

            <div class="form-box">

                <a href="/documents" class="back" style="display: block; margin-bottom: 20px; font-weight: bold; font-size: 14px;">← Back to Document Management</a>
                <h2>Update Document Status</h2>

                <div class="info-box">
                    <p><strong>Control No:</strong> {{ document[1] }}</p>
                    <p><strong>Title:</strong> {{ document[2] }}</p>
                </div>

                <form method="POST">

                    <label>Status</label>
                    <select name="status" required>
                        <option value="Received" {% if document[6] == 'Received' %}selected{% endif %}>Received</option>
                        <option value="Under Review" {% if document[6] == 'Under Review' %}selected{% endif %}>Under Review</option>
                        <option value="Approved" {% if document[6] == 'Approved' %}selected{% endif %}>Approved</option>
                        <option value="Archived" {% if document[6] == 'Archived' %}selected{% endif %}>Archived</option>
                    </select>

                    <label>Remarks</label>
                    <textarea name="remarks">{{ document[7] if document[7] else '' }}</textarea>

                    <button type="submit">Update Document</button>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
