<!DOCTYPE html>
<html>
<head>
    <title>Release Document - LGU System</title>

<style>

/* ===== GLOBAL ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

/* ===== HEADER ===== */
.header{
    background:#1e3c72;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* ===== LAYOUT ===== */
.container{
    display:flex;
}

/* ===== SIDEBAR ===== */
.sidebar{
    width:250px;
    background:#2c3e50;
    min-height:100vh;
    padding-top:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px 20px;
}

.sidebar a:hover{
    background:#34495e;
}

/* ===== CONTENT ===== */
.content{
    flex:1;
    padding:40px;
}

/* ===== FORM CARD ===== */
.form-box{
    background:white;
    width:450px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

/* TITLE */
.form-box h2{
    margin-bottom:20px;
    color:#1e3c72;
}

/* LABEL */
label{
    font-weight:bold;
    color:#333;
}

/* INPUTS */
input{
    width:100%;
    padding:10px;
    margin:8px 0 15px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#1e3c72;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#16325c;
}

/* BACK LINK */
.back{
    display:inline-block;
    margin-top:10px;
    color:#1e3c72;
    text-decoration:none;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>Sangguniang Bayan System</h2>
    <div>Release Module</div>
</div>

<!-- MAIN -->
<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="/">Dashboard</a>
        <a href="/documents">Document Management</a>
        <a href="/archives">Archives</a>
        <a href="/reports">Reports</a>
        <a href="/users">Users</a>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <div class="form-box">

            <a href="/" class="back" style="display: block; margin-bottom: 20px; color: #1e3c72; text-decoration: none; font-weight: bold; font-size: 14px;">← Back to Dashboard</a>
            <h2>Release Document</h2>

            <form method="POST">

                <label>Released To</label>
                <input type="text" name="released_to" required>

                <label>Received By</label>
                <input type="text" name="received_by" required>

                <label>Date Released</label>
                <input type="date" name="date_released" required>

                <button type="submit">Confirm Release</button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
