<!DOCTYPE html>

<html>
<head>
    <title>Add User - LGU System</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#f4f6f9;
    }

    .header{
        background:#1e3c72;
        color:white;
        padding:15px 30px;
        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    .container{
        display:flex;
    }

    .sidebar{
        width:250px;
        background:#2c3e50;
        min-height:100vh;
        padding-top:20px;
    }

    .sidebar a{
        display:block;
        color:white;
        text-decoration:none;
        padding:15px 20px;
    }

    .sidebar a:hover{
        background:#34495e;
    }

    .content{
        flex:1;
        padding:40px;
    }

    .form-box{
        background:white;
        width:400px;
        padding:30px;
        border-radius:10px;
        box-shadow:0 2px 10px rgba(0,0,0,.1);
    }

    .form-box h2{
        margin-bottom:20px;
        color:#1e3c72;
    }

    input, select{
        width:100%;
        padding:10px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:5px;
    }

    button{
        width:100%;
        padding:10px;
        background:#27ae60;
        color:white;
        border:none;
        border-radius:5px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#219150;
    }

    .back{
        display:inline-block;
        margin-top:10px;
        color:#1e3c72;
        text-decoration:none;
    }

</style>

</head>

<body>

<div class="header">
    <h2>Sangguniang Bayan System</h2>
    <div>User Management</div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <a href="/">Dashboard</a>
    <a href="/add">Add Document</a>
    <a href="/archives">Archives</a>
    <a href="/reports">Reports</a>
    <a href="/users">Users</a>
</div>

<!-- CONTENT -->
<div class="content">

    <div class="form-box">

        <h2>Add New User</h2>

        <form method="POST">

            <input type="text" name="fullname" placeholder="Full Name" required>

            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <select name="role">
                <option value="Admin">Admin</option>
                <option value="Staff">Staff</option>
            </select>

            <button type="submit">Save User</button>

        </form>

        <a href="/users" class="back">← Back to Users</a>

    </div>

</div>

</div>

</body>
</html>
